---
layout: default
title: Home
---

<div class="posts-list">
  {% for post in site.posts %}
    <article style="margin-bottom: 50px; border-bottom: 1px solid #eef0ee; padding-bottom: 40px;">
      <h2 style="font-size: 1.8rem; margin-bottom: 10px;">
        <a href="{{ post.url | relative_url }}" style="text-decoration: none; color: #111111;">{{ post.title }}</a>
      </h2>
      <div style="font-family: 'Montserrat', sans-serif; font-size: 0.85rem; color: #999999; margin-bottom: 20px;">
        {{ post.date | date: "%B %d, %Y" }}
      </div>
      <div class="entry-content">
        {% if post.content contains '<!--more-->' %}
          {{ post.content | split:'<!--more-->' | first }}
        {% else %}
          {{ post.content | strip_html | truncatewords: 50 }}
        {% endif %}
      </div>
      <a href="{{ post.url | relative_url }}" class="read-more-btn">Read more</a>
    </article>
  {% endfor %}
</div>
