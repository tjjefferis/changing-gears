<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <!-- Premium Fonts from Original Theme Setup -->
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" type="text/css">

  <style>
    /* ==========================================================================
       CHANGING GEARS: REPLICATED WORDPRESS-STYLE DESIGN
       ========================================================================== */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        background-color: #f5f6f5 !important;
        font-family: 'Lora', Georgia, serif !important;
        color: #3c3c33;
        line-height: 1.75;
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
    }
    
    *, *:before, *:after {
        box-sizing: inherit;
    }

    h1, h2, h3, h4, h5, h6, .custom-nav a, .sidebar-content h2 {
        font-family: 'Montserrat', sans-serif !important;
        color: #111111;
    }

    /* --- Full Width Header Banner --- */
    .header-banner-container {
        width: 100%;
        background-color: #ffffff;
        text-align: center;
        border-bottom: 1px solid #eef0ee;
    }

    .header-banner-container img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
    }

    /* --- Navigation Bar --- */
    .custom-nav {
        background-color: #ffffff;
        padding: 15px 0;
        text-align: center;
        border-bottom: 1px solid #eef0ee;
    }

    .custom-nav a {
        text-decoration: none;
        color: #7f9c90;
        font-weight: 600;
        margin: 0 20px;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: color 0.2s ease;
    }

    .custom-nav a:hover {
        color: #00331D;
    }

    /* --- Main Split Grid Layout --- */
    .main-container {
        max-width: 1140px;
        margin: 40px auto;
        padding: 0 20px;
        display: flex;
        gap: 40px;
    }

    /* Main Content Area */
    main {
        flex: 2;
        background-color: #ffffff;
        padding: 40px;
        border-radius: 4px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.01);
    }

    /* --- Sidebar Area --- */
    aside {
        flex: 1;
        background-color: #ffffff;
        padding: 30px;
        border-radius: 4px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.01);
        height: fit-content;
    }

    .sidebar-profile {
        text-align: center;
        margin-bottom: 30px;
    }

    .sidebar-profile img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
        border: 3px solid #f8faf8;
    }

    .sidebar-content h2 {
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 2px solid #7f9c90;
        padding-bottom: 5px;
        margin-bottom: 15px;
    }

    .sidebar-content p {
        font-size: 0.95rem;
        color: #555555;
    }

    footer {
        text-align: center;
        padding: 40px 0;
        font-size: 0.85rem;
        color: #999999;
        font-family: 'Montserrat', sans-serif;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
        .main-container {
            flex-direction: column;
        }
    }
  </style>
</head>
<body>

  <!-- Replicated Header Image Banner -->
  <div class="header-banner-container">
    <a href="{{ site.baseurl }}/">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrF3V2zga7ASAJ63kwTsiP4SrGXuESeFPKpkqaaVmtBBnNt7ASiyFHG9wj3oq12Xsa5TvjAD1zEfTJAyy-aHNnnVY9eLHKFDc0WkGc0lXIHAJMQ1qFPcGmZEr2MMRQ9S91POcQ-3neMEsUJkaUkcVdS1vI9S4ahCdOVJE8Uw-xFrsS1duXLiqyIzW_-TSj/s1600/Changing%20Gears%20Header.jpg" alt="Changing Gears Banner">
    </a>
  </div>

  <!-- Replicated Navigation Grid -->
  <nav class="custom-nav">
    <a href="{{ site.baseurl }}/">Home</a>
    <a href="{{ site.baseurl }}/future-plans/">Future Plans</a>
  </nav>

  <!-- Content Split Layout -->
  <div class="main-container">
    <main>
      {{ content }}
    </main>

    <!-- Replicated About Sidebar -->
    <aside class="sidebar-content">
      <div class="sidebar-profile">
        <!-- Replicated Profile Image -->
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjVABf8RIJkau1dza5gOqhoffujvIy95eP0TrDCdSQaounVsjiAMLJC5WhKy-OZIZsl8ZDFiYcle8OEc_h9-Cxsa0uxi3ju-5TmgARmWEOiJqwIsHSaK5XL87BqQtd3vL6ABOtK8rpbS8zKyow065VhrA-OYHYy7IjZCqGz2BfufuszY02OCBTR6t6ync4H/s1600/Gemini_Generated_Image_5hkpx55hkpx55hkp.png" alt="About Us">
      </div>
      <h2>About Us</h2>
      <p>Welcome to Changing Gears. We are documenting our journey as we prepare to transition out of full-time international teaching positions into early retirement, travel, and new recreational horizons by July 2027.</p>
    </aside>
  </div>

  <footer>
    &copy; {{ 'now' | date: "%Y" }} {{ site.title }}.
  </footer>

</body>
</html>
